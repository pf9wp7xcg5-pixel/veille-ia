<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Veille IA</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
:root {
  --bg:       #0a0a0a;
  --surface:  #111111;
  --border:   #222222;
  --border2:  #2e2e2e;
  --text:     #e8e6e1;
  --muted:    #666660;
  --accent:   #c8f060;
  --accent2:  #60f0c8;
  --danger:   #f06060;
  --mono:     'Space Mono', monospace;
  --sans:     'DM Sans', sans-serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  font-weight: 300;
  min-height: 100vh;
  font-size: 15px;
  line-height: 1.6;
}

/* ── Header ── */
header {
  position: sticky; top: 0; z-index: 100;
  background: rgba(10,10,10,0.92);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  padding: 0 2rem;
  display: flex; align-items: center; gap: 2rem;
  height: 56px;
}
.logo {
  font-family: var(--mono);
  font-size: 13px;
  font-weight: 700;
  color: var(--accent);
  letter-spacing: 0.08em;
  white-space: nowrap;
}
.logo span { color: var(--muted); }

.search-wrap {
  flex: 1; max-width: 400px;
  position: relative;
}
.search-wrap svg {
  position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
  width: 14px; height: 14px; stroke: var(--muted); fill: none;
  stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
}
#search {
  width: 100%;
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 6px;
  color: var(--text);
  font-family: var(--mono);
  font-size: 12px;
  padding: 7px 10px 7px 32px;
  outline: none;
  transition: border-color .2s;
}
#search:focus { border-color: var(--accent); }
#search::placeholder { color: var(--muted); }

.header-right { display: flex; align-items: center; gap: 1rem; margin-left: auto; }
.cache-info { font-family: var(--mono); font-size: 11px; color: var(--muted); }
.refresh-btn {
  background: none; border: 1px solid var(--border2);
  border-radius: 6px; color: var(--muted);
  font-family: var(--mono); font-size: 11px;
  padding: 5px 10px; cursor: pointer; transition: all .2s;
  display: flex; align-items: center; gap: 6px;
}
.refresh-btn:hover { border-color: var(--accent); color: var(--accent); }
.refresh-btn.spinning svg { animation: spin .8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Filters ── */
.filters {
  padding: 1rem 2rem;
  border-bottom: 1px solid var(--border);
  display: flex; gap: 8px; flex-wrap: wrap;
  align-items: center;
}
.filter-btn {
  background: none;
  border: 1px solid var(--border2);
  border-radius: 4px;
  color: var(--muted);
  font-family: var(--mono);
  font-size: 11px;
  padding: 5px 12px;
  cursor: pointer;
  transition: all .15s;
  letter-spacing: 0.05em;
}
.filter-btn:hover { border-color: var(--border); color: var(--text); }
.filter-btn.active {
  background: var(--accent);
  border-color: var(--accent);
  color: #0a0a0a;
  font-weight: 700;
}
.filter-btn.tag-news.active   { background: var(--accent);  border-color: var(--accent);  color: #0a0a0a; }
.filter-btn.tag-tools.active  { background: var(--accent2); border-color: var(--accent2); color: #0a0a0a; }
.filter-btn.tag-deep.active   { background: #c060f0;        border-color: #c060f0;        color: #fff; }
.filter-btn.tag-video.active  { background: #f09060;        border-color: #f09060;        color: #0a0a0a; }

.count-label { font-family: var(--mono); font-size: 11px; color: var(--muted); margin-left: auto; }

/* ── Grid ── */
main {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: 1px;
  background: var(--border);
  border-top: 1px solid var(--border);
}

/* ── Card ── */
.card {
  background: var(--bg);
  padding: 1.25rem 1.5rem;
  display: flex; flex-direction: column; gap: 10px;
  transition: background .15s;
  position: relative;
  overflow: hidden;
}
.card::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0;
  height: 2px;
  background: transparent;
  transition: background .2s;
}
.card:hover { background: var(--surface); }
.card:hover::before { background: var(--accent); }
.card.tag-tools:hover::before  { background: var(--accent2); }
.card.tag-deep:hover::before   { background: #c060f0; }
.card.tag-video:hover::before  { background: #f09060; }

.card-meta {
  display: flex; align-items: center; gap: 8px;
  font-family: var(--mono); font-size: 10px;
  color: var(--muted);
}
.tag-pill {
  padding: 2px 7px; border-radius: 3px;
  font-weight: 700; letter-spacing: 0.06em;
  font-size: 9px; text-transform: uppercase;
}
.tag-news  .tag-pill { background: #1a2a0a; color: var(--accent); }
.tag-tools .tag-pill { background: #0a2a22; color: var(--accent2); }
.tag-deep  .tag-pill { background: #1a0a2a; color: #c060f0; }
.tag-video .tag-pill { background: #2a1a0a; color: #f09060; }

.card-title {
  font-size: 14px;
  font-weight: 500;
  color: var(--text);
  line-height: 1.45;
  letter-spacing: -0.01em;
}
.card-title a {
  color: inherit; text-decoration: none;
  transition: color .15s;
}
.card-title a:hover { color: var(--accent); }

.card-summary {
  font-size: 13px;
  color: #888882;
  line-height: 1.6;
  font-style: italic;
}
.card-excerpt {
  font-size: 12px;
  color: var(--muted);
  line-height: 1.55;
  display: -webkit-box;
  -webkit-line-clamp: 3;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.card-footer {
  display: flex; align-items: center; justify-content: space-between;
  margin-top: auto; padding-top: 4px;
}
.card-source { font-family: var(--mono); font-size: 10px; color: var(--muted); }
.card-date   { font-family: var(--mono); font-size: 10px; color: var(--muted); }
.card-link {
  font-family: var(--mono); font-size: 10px;
  color: var(--muted); text-decoration: none;
  display: flex; align-items: center; gap: 4px;
  transition: color .15s;
}
.card-link:hover { color: var(--accent); }
.card-link svg { width: 10px; height: 10px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

/* ── States ── */
.empty {
  grid-column: 1 / -1;
  padding: 4rem 2rem;
  text-align: center;
  font-family: var(--mono);
  font-size: 13px;
  color: var(--muted);
}
.skeleton {
  background: var(--surface);
  border-radius: 4px;
  animation: shimmer 1.4s infinite;
}
@keyframes shimmer {
  0%,100% { opacity: .4; }
  50%      { opacity: .8; }
}
.sk-title  { height: 14px; width: 80%; margin-bottom: 8px; }
.sk-line   { height: 11px; width: 100%; margin-bottom: 5px; }
.sk-line2  { height: 11px; width: 65%; }

/* ── Error banner ── */
.error-banner {
  background: #1a0a0a; border: 1px solid #3a1a1a;
  border-radius: 6px; margin: 1rem 2rem;
  padding: 10px 14px;
  font-family: var(--mono); font-size: 12px; color: var(--danger);
  display: none;
}

/* ── Scrollbar ── */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
</style>
</head>
<body>

<header>
  <div class="logo">VEILLE<span>/</span>IA</div>
  <div class="search-wrap">
    <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="search" id="search" placeholder="rechercher..." autocomplete="off">
  </div>
  <div class="header-right">
    <span class="cache-info" id="cache-info"></span>
    <button class="refresh-btn" id="refresh-btn" title="Rafraîchir les flux">
      <svg viewBox="0 0 24 24" width="12" height="12" stroke="currentColor" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M8 16H3v5"/>
      </svg>
      refresh
    </button>
  </div>
</header>

<div class="error-banner" id="error-banner"></div>

<div class="filters" id="filters">
  <button class="filter-btn active" data-tag="all">tout</button>
  <button class="filter-btn tag-news"  data-tag="news">actualités</button>
  <button class="filter-btn tag-tools" data-tag="tools">outils</button>
  <button class="filter-btn tag-deep"  data-tag="deep">recherche</button>
  <button class="filter-btn tag-video" data-tag="video">vidéo / podcast</button>
  <span class="count-label" id="count-label"></span>
</div>

<main id="grid"></main>

<script>
// ── Config ──────────────────────────────────────────────────────────────────
const API = 'https://TON-SERVICE.railway.app'; // ← remplacer par ton URL Railway

// ── State ───────────────────────────────────────────────────────────────────
let allArticles = [];
let currentTag = 'all';
let searchQ = '';

// ── Fetch ────────────────────────────────────────────────────────────────────
async function loadFeed(forceRefresh = false) {
  const grid = document.getElementById('grid');
  showSkeletons(grid);
  hideError();

  try {
    if (forceRefresh) {
      await fetch(`${API}/api/refresh`);
    }
    const url = `${API}/api/feed?limit=100`;
    const res = await fetch(url);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    allArticles = data.articles || [];

    if (data.cached_at) {
      const d = new Date(data.cached_at);
      document.getElementById('cache-info').textContent =
        'màj ' + d.toLocaleTimeString('fr-FR', {hour:'2-digit', minute:'2-digit'});
    }
    render();
  } catch (e) {
    showError(`Impossible de joindre l'API : ${e.message}. Vérifie que le backend Railway est démarré.`);
    grid.innerHTML = '<div class="empty">— aucune donnée —</div>';
  }
}

// ── Render ───────────────────────────────────────────────────────────────────
function render() {
  const grid = document.getElementById('grid');
  let articles = allArticles;

  if (currentTag !== 'all') {
    articles = articles.filter(a => a.tag === currentTag);
  }
  if (searchQ) {
    const q = searchQ.toLowerCase();
    articles = articles.filter(a =>
      a.title.toLowerCase().includes(q) ||
      (a.excerpt || '').toLowerCase().includes(q) ||
      (a.summary || '').toLowerCase().includes(q)
    );
  }

  document.getElementById('count-label').textContent =
    articles.length + ' article' + (articles.length !== 1 ? 's' : '');

  if (!articles.length) {
    grid.innerHTML = '<div class="empty">— aucun résultat —</div>';
    return;
  }

  grid.innerHTML = articles.map(cardHTML).join('');
}

function cardHTML(a) {
  const date = a.date ? relativeDate(a.date) : '';
  const contentBlock = a.summary
    ? `<p class="card-summary">${esc(a.summary)}</p>`
    : a.excerpt
      ? `<p class="card-excerpt">${esc(a.excerpt)}</p>`
      : '';

  return `
  <article class="card tag-${a.tag}">
    <div class="card-meta">
      <span class="tag-pill">${a.tag}</span>
      <span>${esc(a.source)}</span>
    </div>
    <h2 class="card-title">
      <a href="${esc(a.url)}" target="_blank" rel="noopener">${esc(a.title)}</a>
    </h2>
    ${contentBlock}
    <div class="card-footer">
      <span class="card-date">${date}</span>
      <a class="card-link" href="${esc(a.url)}" target="_blank" rel="noopener">
        lire
        <svg viewBox="0 0 24 24"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
      </a>
    </div>
  </article>`;
}

// ── Skeletons ────────────────────────────────────────────────────────────────
function showSkeletons(grid) {
  grid.innerHTML = Array.from({length: 9}, () => `
    <article class="card tag-news">
      <div class="skeleton sk-title"></div>
      <div class="skeleton sk-line"></div>
      <div class="skeleton sk-line"></div>
      <div class="skeleton sk-line2"></div>
    </article>`).join('');
}

// ── Utils ────────────────────────────────────────────────────────────────────
function esc(s) {
  if (!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function relativeDate(iso) {
  const diff = (Date.now() - new Date(iso)) / 1000;
  if (diff < 3600)  return Math.floor(diff/60) + 'min';
  if (diff < 86400) return Math.floor(diff/3600) + 'h';
  if (diff < 604800) return Math.floor(diff/86400) + 'j';
  return new Date(iso).toLocaleDateString('fr-FR', {day:'numeric', month:'short'});
}

function showError(msg) {
  const el = document.getElementById('error-banner');
  el.textContent = msg; el.style.display = 'block';
}
function hideError() {
  document.getElementById('error-banner').style.display = 'none';
}

// ── Events ───────────────────────────────────────────────────────────────────
document.getElementById('filters').addEventListener('click', e => {
  const btn = e.target.closest('.filter-btn');
  if (!btn) return;
  currentTag = btn.dataset.tag;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
});

let searchTimer;
document.getElementById('search').addEventListener('input', e => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => { searchQ = e.target.value.trim(); render(); }, 250);
});

document.getElementById('refresh-btn').addEventListener('click', async () => {
  const btn = document.getElementById('refresh-btn');
  btn.classList.add('spinning');
  await loadFeed(true);
  btn.classList.remove('spinning');
});

// ── Init ─────────────────────────────────────────────────────────────────────
loadFeed();
// Auto-refresh toutes les 30 minutes
setInterval(() => loadFeed(), 30 * 60 * 1000);
</script>
</body>
</html>
