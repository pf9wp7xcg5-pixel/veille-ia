<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Veille IA</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
:root {
  --bg:       #0a0a0a;
  --surface:  #111111;
  --border:   #222222;
  --border2:  #2e2e2e;
  --text:     #e8e6e1;
  --muted:    #666660;
  --accent:   #c8f060;
  --accent2:  #60f0c8;
  --danger:   #f06060;
  --mono:     'Space Mono', monospace;
  --sans:     'DM Sans', sans-serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  font-weight: 300;
  min-height: 100vh;
  font-size: 15px;
  line-height: 1.6;
}

/* ── Header ── */
header {
  position: sticky; top: 0; z-index: 100;
  background: rgba(10,10,10,0.92);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  padding: 0 2rem;
  display: flex; align-items: center; gap: 2rem;
  height: 56px;
}
.logo {
  font-family: var(--mono);
  font-size: 13px;
  font-weight: 700;
  color: var(--accent);
  letter-spacing: 0.08em;
  white-space: nowrap;
}
.logo span { color: var(--muted); }

.search-wrap {
  flex: 1; max-width: 400px;
  position: relative;
}
.search-wrap svg {
  position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
  width: 14px; height: 14px; stroke: var(--muted); fill: none;
  stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
}
#search {
  width: 100%;
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 6px;
  color: var(--text);
  font-family: var(--mono);
  font-size: 12px;
  padding: 7px 10px 7px 32px;
  outline: none;
  transition: border-color .2s;
}
#search:focus { border-color: var(--accent); }
#search::placeholder { color: var(--muted); }

.header-right { display: flex; align-items: center; gap: 1rem; margin-left: auto; }
.cache-info { font-family: var(--mono); font-size: 11px; color: var(--muted); }
.refresh-btn {
  background: none; border: 1px solid var(--border2);
  border-radius: 6px; color: var(--muted);
  font-family: var(--mono); font-size: 11px;
  padding: 5px 10px; cursor: pointer; transition: all .2s;
  display: flex; align-items: center; gap: 6px;
}
.refresh-btn:hover { border-color: var(--accent); color: var(--accent); }
.refresh-btn.spinning svg { animation: spin .8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Filters ── */
.filters {
  padding: 1rem 2rem;
  border-bottom: 1px solid var(--border);
  display: flex; gap: 8px; flex-wrap: wrap;
  align-items: center;
}
.filter-btn {
  background: none;
  border: 1px solid var(--border2);
  border-radius: 4px;
  color: var(--muted);
  font-family: var(--mono);
  font-size: 11px;
  padding: 5px 12px;
  cursor: pointer;
  transition: all .15s;
  letter-spacing: 0.05em;
}
.filter-btn:hover { border-color: var(--border); color: var(--text); }
.filter-btn.active {
  background: var(--accent);
  border-color: var(--accent);
  color: #0a0a0a;
  font-weight: 700;
}
.filter-btn.tag-news.active   { background: var(--accent);  border-color: var(--accent);  color: #0a0a0a; }
.filter-btn.tag-tools.active  { background: var(--accent2); border-color: var(--accent2); color: #0a0a0a; }
.filter-btn.tag-deep.active   { background: #c060f0;        border-color: #c060f0;        color: #fff; }
.filter-btn.tag-video.active  { background: #f09060;        border-color: #f09060;        color: #0a0a0a; }

.count-label { font-family: var(--mono); font-size: 11px; color: var(--muted); margin-left: auto; }

/* ── Grid ── */
main {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: 1px;
  background: var(--border);
  border-top: 1px solid var(--border);
}

/* ── Card ── */
.card {
  background: var(--bg);
  padding: 1.25rem 1.5rem;
  display: flex; flex-direction: column; gap: 10px;
  transition: background .15s;
  position: relative;
  overflow: hidden;
}
.card::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0;
  height: 2px;
  background: transparent;
  transition: background .2s;
}
.card:hover { background: var(--surface); }
.card:hover::before { background: var(--accent); }
.card.tag-tools:hover::before  { background: var(--accent2); }
.card.tag-deep:hover::before   { background: #c060f0; }
.card.tag-video:hover::before  { background: #f09060; }

.card-meta {
  display: flex; align-items: center; gap: 8px;
  font-family: var(--mono); font-size: 10px;
  color: var(--muted);
}
.tag-pill {
  padding: 2px 7px; border-radius: 3px;
  font-weight: 700; letter-spacing: 0.06em;
  font-size: 9px; text-transform: uppercase;
}
.tag-news  .tag-pill { background: #1a2a0a; color: var(--accent); }
.tag-tools .tag-pill { background: #0a2a22; color: var(--accent2); }
.tag-deep  .tag-pill { background: #1a0a2a; color: #c060f0; }
.tag-video .tag-pill { background: #2a1a0a; color: #f09060; }

.card-title {
  font-size: 14px;
  font-weight: 500;
  color: var(--text);
  line-height: 1.45;
  letter-spacing: -0.01em;
}
.card-title a {
  color: inherit; text-decoration: none;
  transition: color .15s;
}
.card-title a:hover { color: var(--accent); }

.card-summary {
  font-size: 13px;
  color: #888882;
  line-height: 1.6;
  font-style: italic;
}
.card-excerpt {
  font-size: 12px;
  color: var(--muted);
  line-height: 1.55;
  display: -webkit-box;
  -webkit-line-clamp: 3;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.card-footer {
  display: flex; align-items: center; justify-content: space-between;
  margin-top: auto; padding-top: 4px;
}
.card-source { font-family: var(--mono); font-size: 10px; color: var(--muted); }
.card-date   { font-family: var(--mono); font-size: 10px; color: var(--muted); }
.card-link {
  font-family: var(--mono); font-size: 10px;
  color: var(--muted); text-decoration: none;
  display: flex; align-items: center; gap: 4px;
  transition: color .15s;
}
.card-link:hover { color: var(--accent); }
.card-link svg { width: 10px; height: 10px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

/* ── States ── */
.empty {
  grid-column: 1 / -1;
  padding: 4rem 2rem;
  text-align: center;
  font-family: var(--mono);
  font-size: 13px;
  color: var(--muted);
}
.skeleton {
  background: var(--surface);
  border-radius: 4px;
  animation: shimmer 1.4s infinite;
}
@keyframes shimmer {
  0%,100% { opacity: .4; }
  50%      { opacity: .8; }
}
.sk-title  { height: 14px; width: 80%; margin-bottom: 8px; }
.sk-line   { height: 11px; width: 100%; margin-bottom: 5px; }
.sk-line2  { height: 11px; width: 65%; }

/* ── Modal traduction ── */
.modal-overlay {
  display: none;
  position: fixed; inset: 0; z-index: 200;
  background: rgba(0,0,0,0.75);
  backdrop-filter: blur(4px);
  align-items: center; justify-content: center;
  padding: 1.5rem;
}
.modal-overlay.open { display: flex; }

.modal {
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 8px;
  max-width: 680px; width: 100%;
  max-height: 85vh;
  display: flex; flex-direction: column;
  overflow: hidden;
}
.modal-header {
  padding: 1.25rem 1.5rem 1rem;
  border-bottom: 1px solid var(--border);
  display: flex; flex-direction: column; gap: 10px;
}
.modal-meta {
  display: flex; align-items: center; gap: 8px;
  font-family: var(--mono); font-size: 10px; color: var(--muted);
}
.modal-title {
  font-size: 16px; font-weight: 500; line-height: 1.4;
  letter-spacing: -0.01em;
}
.modal-actions {
  display: flex; align-items: center; gap: 10px; margin-top: 2px;
}
.modal-source-link {
  font-family: var(--mono); font-size: 11px;
  color: var(--accent); text-decoration: none;
  display: flex; align-items: center; gap: 5px;
  border: 1px solid var(--accent);
  border-radius: 4px; padding: 4px 10px;
  transition: all .15s;
}
.modal-source-link:hover { background: var(--accent); color: #0a0a0a; }
.modal-source-link svg { width: 10px; height: 10px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
.modal-close {
  margin-left: auto;
  background: none; border: 1px solid var(--border2);
  border-radius: 4px; color: var(--muted);
  font-family: var(--mono); font-size: 11px;
  padding: 4px 10px; cursor: pointer; transition: all .15s;
}
.modal-close:hover { border-color: var(--danger); color: var(--danger); }

.modal-body {
  padding: 1.25rem 1.5rem;
  overflow-y: auto;
  flex: 1;
  font-size: 14px; line-height: 1.75; color: #ccc;
}
.modal-body p { margin-bottom: 1em; }
.modal-loading {
  display: flex; align-items: center; gap: 10px;
  font-family: var(--mono); font-size: 12px; color: var(--muted);
  padding: 2rem 0;
}
.modal-loading-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--accent);
  animation: pulse 1.2s ease-in-out infinite;
}
.modal-loading-dot:nth-child(2) { animation-delay: .2s; }
.modal-loading-dot:nth-child(3) { animation-delay: .4s; }
@keyframes pulse { 0%,100%{opacity:.2} 50%{opacity:1} }
.modal-error { font-family: var(--mono); font-size: 12px; color: var(--danger); }

/* Rendre les cartes cliquables */
.card { cursor: pointer; }

/* ── Error banner ── */
.error-banner {
  background: #1a0a0a; border: 1px solid #3a1a1a;
  border-radius: 6px; margin: 1rem 2rem;
  padding: 10px 14px;
  font-family: var(--mono); font-size: 12px; color: var(--danger);
  display: none;
}

/* ── Scrollbar ── */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

/* ── Admin sources panel ── */
.admin-overlay {
  display: none;
  position: fixed; inset: 0; z-index: 200;
  background: rgba(0,0,0,0.75);
  backdrop-filter: blur(4px);
  align-items: center; justify-content: center;
  padding: 1.5rem;
}
.admin-overlay.open { display: flex; }
.admin-panel {
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 8px;
  width: 100%; max-width: 640px;
  max-height: 85vh;
  display: flex; flex-direction: column;
  overflow: hidden;
}
.admin-header {
  padding: 1.1rem 1.5rem;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.admin-header h3 {
  font-family: var(--mono); font-size: 13px; font-weight: 700;
  color: var(--accent); letter-spacing: 0.06em;
}
.admin-body { padding: 1.25rem 1.5rem; overflow-y: auto; flex: 1; display: flex; flex-direction: column; gap: 1.25rem; }
.admin-sources-list { display: flex; flex-direction: column; gap: 6px; }
.admin-source-row {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 12px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 5px;
  font-size: 12px;
}
.admin-source-row .src-name { flex: 1; color: var(--text); font-weight: 500; }
.admin-source-row .src-tag {
  font-family: var(--mono); font-size: 9px; font-weight: 700;
  padding: 2px 6px; border-radius: 3px; text-transform: uppercase;
}
.src-tag-news  { background: #1a2a0a; color: var(--accent); }
.src-tag-tools { background: #0a2a22; color: var(--accent2); }
.src-tag-deep  { background: #1a0a2a; color: #c060f0; }
.src-tag-video { background: #2a1a0a; color: #f09060; }
.admin-source-row .src-url { font-family: var(--mono); font-size: 10px; color: var(--muted); flex: 2; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.del-btn {
  background: none; border: 1px solid transparent;
  border-radius: 4px; color: var(--muted); font-size: 12px;
  cursor: pointer; padding: 2px 7px; transition: all .15s; flex-shrink: 0;
}
.del-btn:hover { border-color: var(--danger); color: var(--danger); }
.admin-add-form {
  border-top: 1px solid var(--border);
  padding-top: 1.1rem;
  display: flex; flex-direction: column; gap: 10px;
}
.admin-add-form h4 { font-family: var(--mono); font-size: 11px; color: var(--muted); letter-spacing: 0.05em; }
.form-row { display: flex; gap: 8px; flex-wrap: wrap; }
.form-field { display: flex; flex-direction: column; gap: 4px; flex: 1; min-width: 140px; }
.form-field label { font-family: var(--mono); font-size: 10px; color: var(--muted); }
.form-field input, .form-field select {
  background: var(--bg);
  border: 1px solid var(--border2);
  border-radius: 5px;
  color: var(--text);
  font-family: var(--mono); font-size: 12px;
  padding: 6px 10px; outline: none;
  transition: border-color .2s;
}
.form-field input:focus, .form-field select:focus { border-color: var(--accent); }
.form-field input::placeholder { color: var(--muted); }
.form-field select option { background: var(--surface); }
.add-btn {
  background: var(--accent); border: none; border-radius: 5px;
  color: #0a0a0a; font-family: var(--mono); font-size: 12px;
  font-weight: 700; padding: 8px 18px; cursor: pointer;
  transition: opacity .15s; align-self: flex-end;
}
.add-btn:hover { opacity: 0.85; }
.add-btn:disabled { opacity: 0.4; cursor: not-allowed; }
.admin-msg { font-family: var(--mono); font-size: 11px; min-height: 16px; }
.admin-msg.ok  { color: var(--accent); }
.admin-msg.err { color: var(--danger); }
</style>
</head>
<body>

<header>
  <div class="logo">VEILLE<span>/</span>IA</div>
  <div class="search-wrap">
    <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="search" id="search" placeholder="rechercher..." autocomplete="off">
  </div>
  <div class="header-right">
    <span class="cache-info" id="cache-info"></span>
    <button class="refresh-btn" id="sources-btn" title="Gérer les sources">
      <svg viewBox="0 0 24 24" width="12" height="12" stroke="currentColor" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14"/>
        <path d="M12 2v2m0 16v2M2 12h2m16 0h2"/>
      </svg>
      sources
    </button>
    <button class="refresh-btn" id="refresh-btn" title="Rafraîchir les flux">
      <svg viewBox="0 0 24 24" width="12" height="12" stroke="currentColor" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M8 16H3v5"/>
      </svg>
      refresh
    </button>
  </div>
</header>

<div class="error-banner" id="error-banner"></div>

<div class="filters" id="filters">
  <button class="filter-btn active" data-tag="all">tout</button>
  <button class="filter-btn tag-news"  data-tag="news">actualités</button>
  <button class="filter-btn tag-tools" data-tag="tools">outils</button>
  <button class="filter-btn tag-deep"  data-tag="deep">recherche</button>
  <button class="filter-btn tag-video" data-tag="video">vidéo / podcast</button>
  <span class="count-label" id="count-label"></span>
</div>

<main id="grid"></main>

<!-- Panel admin sources -->
<div class="admin-overlay" id="admin-overlay">
  <div class="admin-panel">
    <div class="admin-header">
      <h3>SOURCES RSS</h3>
      <button class="modal-close" id="admin-close">✕ fermer</button>
    </div>
    <div class="admin-body">
      <div class="admin-sources-list" id="admin-sources-list">
        <div style="font-family:var(--mono);font-size:12px;color:var(--muted)">Chargement…</div>
      </div>
      <div class="admin-add-form">
        <h4>AJOUTER UNE SOURCE</h4>
        <div class="form-row">
          <div class="form-field" style="flex:2">
            <label>Nom</label>
            <input type="text" id="add-name" placeholder="ex: The Decoder">
          </div>
          <div class="form-field" style="flex:1;min-width:110px">
            <label>Catégorie</label>
            <select id="add-tag">
              <option value="news">actualités</option>
              <option value="tools">outils</option>
              <option value="deep">recherche</option>
              <option value="video">vidéo / podcast</option>
            </select>
          </div>
        </div>
        <div class="form-field">
          <label>URL du flux RSS</label>
          <input type="url" id="add-url" placeholder="https://…/rss">
        </div>
        <div style="display:flex;align-items:center;gap:12px">
          <button class="add-btn" id="add-btn">+ Ajouter</button>
          <span class="admin-msg" id="admin-msg"></span>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Modal traduction -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal" id="modal">
    <div class="modal-header">
      <div class="modal-meta" id="modal-meta"></div>
      <div class="modal-title" id="modal-title"></div>
      <div class="modal-actions">
        <a class="modal-source-link" id="modal-source-link" href="#" target="_blank" rel="noopener">
          lire l'article original
          <svg viewBox="0 0 24 24"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
        </a>
        <button class="modal-close" id="modal-close">✕ fermer</button>
      </div>
    </div>
    <div class="modal-body" id="modal-body">
      <div class="modal-loading" id="modal-loading">
        <div class="modal-loading-dot"></div>
        <div class="modal-loading-dot"></div>
        <div class="modal-loading-dot"></div>
        <span>traduction en cours...</span>
      </div>
    </div>
  </div>
</div>

<script>
// ── Config ──────────────────────────────────────────────────────────────────
const API = 'https://veille-ia-production-8e0d.up.railway.app';

// ── State ───────────────────────────────────────────────────────────────────
let allArticles = [];
let currentTag = 'all';
let searchQ = '';

// ── Fetch ────────────────────────────────────────────────────────────────────
async function loadFeed(forceRefresh = false) {
  const grid = document.getElementById('grid');
  showSkeletons(grid);
  hideError();

  try {
    if (forceRefresh) {
      await fetch(`${API}/api/refresh`);
    }
    const url = `${API}/api/feed?limit=100`;
    const res = await fetch(url);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    allArticles = data.articles || [];

    if (data.cached_at) {
      const d = new Date(data.cached_at);
      document.getElementById('cache-info').textContent =
        'màj ' + d.toLocaleDateString('fr-FR', {day:'numeric', month:'short'}) + ' ' + d.toLocaleTimeString('fr-FR', {hour:'2-digit', minute:'2-digit'});
    }
    render();
  } catch (e) {
    showError(`Impossible de joindre l'API : ${e.message}. Vérifie que le backend Railway est démarré.`);
    grid.innerHTML = '<div class="empty">— aucune donnée —</div>';
  }
}

// ── Render ───────────────────────────────────────────────────────────────────
function render() {
  const grid = document.getElementById('grid');
  let articles = allArticles;

  if (currentTag !== 'all') {
    articles = articles.filter(a => a.tag === currentTag);
  }
  if (searchQ) {
    const q = searchQ.toLowerCase();
    articles = articles.filter(a =>
      a.title.toLowerCase().includes(q) ||
      (a.excerpt || '').toLowerCase().includes(q) ||
      (a.summary || '').toLowerCase().includes(q)
    );
  }

  document.getElementById('count-label').textContent =
    articles.length + ' article' + (articles.length !== 1 ? 's' : '');

  if (!articles.length) {
    grid.innerHTML = '<div class="empty">— aucun résultat —</div>';
    return;
  }

  grid.innerHTML = articles.map((a, i) => cardHTML(a, i)).join('');
}

function cardHTML(a, idx) {
  const date = a.date ? relativeDate(a.date) : '';
  const contentBlock = a.summary
    ? `<p class="card-summary">${esc(a.summary)}</p>`
    : a.excerpt
      ? `<p class="card-excerpt">${esc(a.excerpt)}</p>`
      : '';

  return `
  <article class="card tag-${a.tag}" data-idx="${idx}">
    <div class="card-meta">
      <span class="tag-pill">${a.tag}</span>
      <span>${esc(a.source)}</span>
    </div>
    <h2 class="card-title">
      <a href="${esc(a.url)}" target="_blank" rel="noopener">${esc(a.title_fr || a.title)}</a>
    </h2>
    ${contentBlock}
    <div class="card-footer">
      <span class="card-date">${date}</span>
      <a class="card-link" href="${esc(a.url)}" target="_blank" rel="noopener">
        lire
        <svg viewBox="0 0 24 24"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
      </a>
    </div>
  </article>`;
}

// ── Skeletons ────────────────────────────────────────────────────────────────
function showSkeletons(grid) {
  grid.innerHTML = Array.from({length: 9}, () => `
    <article class="card tag-news">
      <div class="skeleton sk-title"></div>
      <div class="skeleton sk-line"></div>
      <div class="skeleton sk-line"></div>
      <div class="skeleton sk-line2"></div>
    </article>`).join('');
}

// ── Utils ────────────────────────────────────────────────────────────────────
function esc(s) {
  if (!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function relativeDate(iso) {
  const diff = (Date.now() - new Date(iso)) / 1000;
  if (diff < 3600)  return Math.floor(diff/60) + 'min';
  if (diff < 86400) return Math.floor(diff/3600) + 'h';
  if (diff < 604800) return Math.floor(diff/86400) + 'j';
  return new Date(iso).toLocaleDateString('fr-FR', {day:'numeric', month:'short'});
}

function showError(msg) {
  const el = document.getElementById('error-banner');
  el.textContent = msg; el.style.display = 'block';
}
function hideError() {
  document.getElementById('error-banner').style.display = 'none';
}

// ── Events ───────────────────────────────────────────────────────────────────
document.getElementById('filters').addEventListener('click', e => {
  const btn = e.target.closest('.filter-btn');
  if (!btn) return;
  currentTag = btn.dataset.tag;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
});

let searchTimer;
document.getElementById('search').addEventListener('input', e => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => { searchQ = e.target.value.trim(); render(); }, 250);
});

document.getElementById('refresh-btn').addEventListener('click', async () => {
  const btn = document.getElementById('refresh-btn');
  btn.classList.add('spinning');
  await loadFeed(true);
  btn.classList.remove('spinning');
});

// ── Modal traduction ─────────────────────────────────────────────────────────
function openModal(article) {
  const overlay = document.getElementById('modal-overlay');
  document.getElementById('modal-title').textContent = article.title_fr || article.title;
  document.getElementById('modal-meta').innerHTML =
    `<span class="tag-pill" style="background:var(--surface);border:1px solid var(--border2);color:var(--muted)">${article.tag}</span>
     <span>${esc(article.source)}</span>`;
  document.getElementById('modal-source-link').href = article.url;
  document.getElementById('modal-body').innerHTML = `
    <div class="modal-loading" id="modal-loading">
      <div class="modal-loading-dot"></div>
      <div class="modal-loading-dot"></div>
      <div class="modal-loading-dot"></div>
      <span>traduction en cours...</span>
    </div>`;
  overlay.classList.add('open');
  document.body.style.overflow = 'hidden';
  fetchTranslation(article);
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  document.body.style.overflow = '';
}

async function fetchTranslation(article) {
  try {
    const params = new URLSearchParams({
      url: article.url,
      title: article.title,
      excerpt: article.excerpt || article.summary || '',
    });
    const res = await fetch(`${API}/api/translate?${params}`);
    const data = await res.json();
    const body = document.getElementById('modal-body');
    if (data.error || !data.translation) {
      body.innerHTML = `<p class="modal-error">Erreur : ${esc(data.error || data.detail || 'Réponse inattendue du serveur')}</p>`;
    } else {
      const paragraphs = data.translation
        .split(/\n+/)
        .filter(p => p.trim())
        .map(p => `<p>${esc(p)}</p>`)
        .join('');
      body.innerHTML = paragraphs || `<p class="modal-error">Traduction vide.</p>`;
    }
  } catch (e) {
    document.getElementById('modal-body').innerHTML =
      `<p class="modal-error">Impossible de joindre l'API : ${esc(e.message)}</p>`;
  }
}

// Fermeture modal
document.getElementById('modal-close').addEventListener('click', closeModal);
document.getElementById('modal-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
});
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

// Clic sur les cartes → ouvre le modal
document.getElementById('grid').addEventListener('click', e => {
  // Ne pas déclencher si clic sur un lien (le "lire l'article" existant)
  if (e.target.closest('a')) return;
  const card = e.target.closest('.card');
  if (!card) return;
  const idx = parseInt(card.dataset.idx);
  if (isNaN(idx)) return;
  let articles = allArticles;
  if (currentTag !== 'all') articles = articles.filter(a => a.tag === currentTag);
  if (searchQ) {
    const q = searchQ.toLowerCase();
    articles = articles.filter(a =>
      a.title.toLowerCase().includes(q) ||
      (a.excerpt || '').toLowerCase().includes(q) ||
      (a.summary || '').toLowerCase().includes(q)
    );
  }
  if (articles[idx]) openModal(articles[idx]);
});

// ── Admin sources ─────────────────────────────────────────────────────────────
const TAG_LABELS = { news: 'actualités', tools: 'outils', deep: 'recherche', video: 'vidéo' };

async function openAdmin() {
  document.getElementById('admin-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
  await refreshAdminList();
}

function closeAdmin() {
  document.getElementById('admin-overlay').classList.remove('open');
  document.body.style.overflow = '';
  document.getElementById('admin-msg').textContent = '';
  document.getElementById('admin-msg').className = 'admin-msg';
}

async function refreshAdminList() {
  const list = document.getElementById('admin-sources-list');
  try {
    const res = await fetch(`${API}/api/sources`);
    const data = await res.json();
    list.innerHTML = data.sources.map(s => `
      <div class="admin-source-row">
        <span class="src-name">${esc(s.name)}</span>
        <span class="src-tag src-tag-${s.tag}">${TAG_LABELS[s.tag] || s.tag}</span>
        <span class="src-url" title="${esc(s.url)}">${esc(s.url)}</span>
        <button class="del-btn" data-id="${esc(s.id)}">✕</button>
      </div>`).join('');
    list.querySelectorAll('.del-btn').forEach(btn => {
      btn.addEventListener('click', () => deleteSource(btn.dataset.id, btn.closest('.admin-source-row')));
    });
  } catch (e) {
    list.innerHTML = `<div style="font-family:var(--mono);font-size:12px;color:var(--danger)">Erreur : ${esc(e.message)}</div>`;
  }
}

async function deleteSource(id, row) {
  row.style.opacity = '0.4';
  try {
    const res = await fetch(`${API}/api/sources/${encodeURIComponent(id)}`, { method: 'DELETE' });
    if (!res.ok) throw new Error((await res.json()).detail);
    row.remove();
    setAdminMsg('Source supprimée.', 'ok');
    loadFeed();
  } catch (e) {
    row.style.opacity = '1';
    setAdminMsg('Erreur : ' + e.message, 'err');
  }
}

function setAdminMsg(text, type) {
  const el = document.getElementById('admin-msg');
  el.textContent = text;
  el.className = 'admin-msg ' + type;
  setTimeout(() => { el.textContent = ''; el.className = 'admin-msg'; }, 4000);
}

document.getElementById('add-btn').addEventListener('click', async () => {
  const name = document.getElementById('add-name').value.trim();
  const tag  = document.getElementById('add-tag').value;
  const url  = document.getElementById('add-url').value.trim();
  if (!name || !url) { setAdminMsg('Nom et URL requis.', 'err'); return; }
  const btn = document.getElementById('add-btn');
  btn.disabled = true; btn.textContent = '…';
  try {
    const res = await fetch(`${API}/api/sources`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, tag, url }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.detail || 'Erreur');
    document.getElementById('add-name').value = '';
    document.getElementById('add-url').value  = '';
    setAdminMsg(`"${name}" ajoutée — refresh en cours…`, 'ok');
    await refreshAdminList();
    loadFeed();
  } catch (e) {
    setAdminMsg('Erreur : ' + e.message, 'err');
  } finally {
    btn.disabled = false; btn.textContent = '+ Ajouter';
  }
});

document.getElementById('sources-btn').addEventListener('click', openAdmin);
document.getElementById('admin-close').addEventListener('click', closeAdmin);
document.getElementById('admin-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('admin-overlay')) closeAdmin();
});

// ── Init ─────────────────────────────────────────────────────────────────────
loadFeed();
// Auto-refresh toutes les 30 minutes
setInterval(() => loadFeed(), 30 * 60 * 1000);
</script>
